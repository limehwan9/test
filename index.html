<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TM to Micro:bit</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <h2>티쳐블 머신 - 마이크로비트 연결</h2>
    <input type="text" id="model-url" placeholder="티쳐블 머신 URL을 입력하세요" style="width:300px;">
    <button onclick="init()">모델 로드 및 캠 시작</button>
    <hr>
    <button onclick="connectBT()" style="background-color: #4CAF50; color: white; padding: 10px; cursor: pointer;">마이크로비트 블루투스 연결</button>
    <p id="status">상태: 대기 중...</p>
    <div id="webcam-container"></div>
    <div id="label-container" style="font-size: 24px; font-weight: bold; color: blue; margin-top: 10px;"></div>

    <script>
        let model, webcam, labelContainer, maxPredictions;
        let uartCharacteristic;

        async function connectBT() {
            const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
            const UART_TX_CHARACTERISTIC_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                uartCharacteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);
                document.getElementById('status').innerText = "상태: 연결 성공!";
            } catch (error) {
                alert("연결 오류: " + error);
            }
        }

        async function init() {
            const URL = document.getElementById('model-url').value;
            if(!URL) return alert("URL을 입력해주세요.");
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();
                webcam = new tmImage.Webcam(200, 200, true);
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(loop);
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
            } catch (e) {
                alert("모델 로드 실패. URL을 확인하세요.");
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        let lastSentClass = "";
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let highestProb = 0;
            let bestClass = "";
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestClass = prediction[i].className;
                }
            }
            labelContainer.innerText = "결과: " + bestClass;
            if (highestProb > 0.90 && bestClass !== lastSentClass) {
                if (uartCharacteristic) {
                    const data = new TextEncoder().encode(bestClass + "\n");
                    uartCharacteristic.writeValue(data);
                }
                lastSentClass = bestClass;
            }
        }
    </script>
</body>
</html>
